<!DOCTYPE html>
<html>
<body>
  <h1>True Video Extractor</h1>
  <video id="vid" src="/que_01_pattern_02.mp4" crossorigin="anonymous" style="display:none;"></video>
  <canvas id="can" style="display:none;"></canvas>
  <pre id="out" style="font-family: monospace; font-size: 14px; background: #222; color: #fff; padding: 20px;"></pre>

  <script>
    const v = document.getElementById('vid');
    const c = document.getElementById('can');
    const out = document.getElementById('out');
    
    v.onloadeddata = () => {
      v.currentTime = 1.0; // Advance to 1 second so we get a good frame
    };

    v.onseeked = () => {
      c.width = v.videoWidth; // native video dimensions
      c.height = v.videoHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(v, 0, 0, c.width, c.height);
      
      const img = ctx.getImageData(0, 0, c.width, c.height);
      const data = img.data;
      const w = c.width;
      const h = c.height;

      // Find the grid bounding box by looking for bright colored pixels
      let minX = w, maxX = 0, minY = h, maxY = 0;
      
      for (let y = 0; y < h; y+=2) {
        for (let x = 0; x < w; x+=2) {
          const idx = (y * w + x) * 4;
          const r = data[idx];
          const g = data[idx+1];
          const b = data[idx+2];
          
          if ((r > 100 && g < 60 && b < 60) || 
              (g > 100 && r < 60 && b < 60) || 
              (b > 100 && r < 60 && g < 60)) {
            if(x < minX) minX = x;
            if(x > maxX) maxX = x;
            if(y < minY) minY = y;
            if(y > maxY) maxY = y;
          }
        }
      }

      // Slightly pad or shrink to get exact grid boundary. Assume 10x30.
      const tileW = (maxX - minX) / 10;
      const tileH = (maxY - minY) / 30;

      let result = "GRID MAP:\n";
      for (let row = 0; row < 30; row++) {
        let rowStr = `R${row.toString().padStart(2, '0')}: `;
        for (let col = 0; col < 10; col++) {
          const cx = minX + Math.floor((col + 0.5) * tileW);
          const cy = minY + Math.floor((row + 0.5) * tileH);

          let rSum = 0, gSum = 0, bSum = 0;
          for (let dy = -2; dy <= 2; dy++) {
            for (let dx = -2; dx <= 2; dx++) {
              const idx = ((cy + dy) * w + (cx + dx)) * 4;
              rSum += data[idx];
              gSum += data[idx+1];
              bSum += data[idx+2];
            }
          }
          const rAvg = rSum / 25;
          const gAvg = gSum / 25;
          const bAvg = bSum / 25;

          let block = " 0 ";
          if (rAvg > gAvg + 30 && rAvg > bAvg + 30) block = " R ";
          else if (gAvg > rAvg + 30 && gAvg > bAvg + 30) block = " G ";
          else if (bAvg > rAvg + 30 && bAvg > gAvg + 30) block = " B ";
          
          rowStr += block;
        }
        result += rowStr + "\n";
      }
      
      out.innerText = result;
      document.title = "DONE";
    };
  </script>
</body>
</html>
